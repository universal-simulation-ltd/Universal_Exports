<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 56" width="200" height="56" role="img" aria-label="UNI SIM">
  <defs>
    <!-- Embossed effect: light highlight on top, soft shadow at bottom -->
    <filter id="emboss" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="2" specularConstant="0.9" specularExponent="20" lighting-color="#FFFFFF" result="spec">
        <feDistantLight azimuth="270" elevation="55"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specOut"/>
      <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="lit"/>
      <feOffset in="SourceAlpha" dx="0" dy="1" result="shadow"/>
      <feGaussianBlur in="shadow" stdDeviation="0.6" result="shadowBlur"/>
      <feFlood flood-color="#000000" flood-opacity="0.35"/>
      <feComposite in2="shadowBlur" operator="in" result="shadowOut"/>
      <feMerge>
        <feMergeNode in="shadowOut"/>
        <feMergeNode in="lit"/>
      </feMerge>
    </filter>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9B8E7F"/>
      <stop offset="0.5" stop-color="#6E6457"/>
      <stop offset="1" stop-color="#3F3830"/>
    </linearGradient>
  </defs>
  <g filter="url(#emboss)" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-weight="800" letter-spacing="2">
    <text x="6" y="38" font-size="28" fill="url(#metal)">UNI</text>
    <text x="78" y="38" font-size="28" fill="#E54E0F" opacity="0.95">SIM</text>
  </g>
  <rect x="6" y="46" width="160" height="2" rx="1" fill="url(#metal)" opacity="0.55"/>
</svg>
